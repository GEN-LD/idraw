# iDraw 前端 Nginx 反向代理配置示例
#
# 使用方式（任选其一）：
#
# 方式 A：将下面整个 server 块保存为独立文件（如 /etc/nginx/conf.d/idraw.conf）
# 方式 B：将 location /idraw/ 片段加入已有 server 块中
#
# 前置条件：
#   - 前端构建产物已生成（cd frontend && npm run build）
#   - 上游服务已启动：cd frontend && PORT=8888 ./start.sh
#     （默认监听 127.0.0.1:8888，仅本机访问）
#   - 已准备好 SSL 证书（如 Let's Encrypt 或自签名），修改下方 ssl_certificate 路径

# ===== 独立 HTTPS server 块示例（端口 443）=====
server {
    listen       443 ssl;
    listen       [::]:443 ssl;
    http2        on;
    server_name  _;

    # SSL 证书路径（请按实际情况修改）
    ssl_certificate     /etc/nginx/ssl/idraw.crt;
    ssl_certificate_key /etc/nginx/ssl/idraw.key;

    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # iDraw 前端
    location /idraw/ {
        proxy_pass         http://127.0.0.1:8888/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ===== 可选：HTTP (80) 自动跳转到 HTTPS =====
