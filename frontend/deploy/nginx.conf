# }

# 说明：
# - 前端采用 HashRouter，路由形如 /idraw/#/draw，无需额外的 try_files 兜底。
# - Vite 构建时已将 base 设为 /idraw/，所有静态资源以 /idraw/assets/... 引用，
#   Nginx 将 /idraw/ 前缀剥离后代理到上游 8888 端口的 dist/ 目录。
# - 访问地址：https://your-host/idraw/
# - 如上游端口不同，请同步修改 proxy_pass。
# - ssl_certificate 需替换为真实证书路径，常见来源：
#     * Let's Encrypt: /etc/letsencrypt/live/<domain>/fullchain.pem
#     * 自签名:        openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#                      -keyout /etc/nginx/ssl/idraw.key \
#                      -out    /etc/nginx/ssl/idraw.crt