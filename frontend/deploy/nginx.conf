# iDraw 前端 Nginx 反向代理配置示例
#
# 使用方式（任选其一）：
#
# 方式 A：将下面整个 server 块保存为独立文件（如 /etc/nginx/conf.d/idraw.conf）
# 方式 B：将 location /idraw/ 片段加入已有 server 块中
#
# 前置条件：
#   - 前端构建产物已生成（cd frontend && npm run build）
#   - 上游服务已启动：cd frontend && PORT=8888 ./start.sh
#     （默认监听 127.0.0.1:8888，仅本机访问）

# ===== 独立 server 块示例 =====
server {
    listen       80;
    server_name  _;

    # iDraw 前端
    location /idraw/ {
        proxy_pass         http://127.0.0.1:8888/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ===== 或作为已有 server 的 location 片段 =====
# location /idraw/ {
#     proxy_pass         http://127.0.0.1:8888/;
#     proxy_http_version 1.1;
#     proxy_set_header   Host              $host;
#     proxy_set_header   X-Real-IP         $remote_addr;
#     proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
#     proxy_set_header   X-Forwarded-Proto $scheme;
# }

# 说明：
# - 前端采用 HashRouter，路由形如 /idraw/#/draw，无需额外的 try_files 兜底。
# - Vite 构建时已将 base 设为 /idraw/，所有静态资源以 /idraw/assets/... 引用，
#   Nginx 将 /idraw/ 前缀剥离后代理到上游 8888 端口的 dist/ 目录。
# - 如上游端口不同，请同步修改 proxy_pass。